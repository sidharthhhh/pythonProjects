version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - MAX_UPLOAD_SIZE=52428800 # 50MB
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery_worker:
    build: .
    command: celery -A app.pipeline.orchestrator worker --loglevel=info
    volumes:
      - ./app:/app/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    depends_on:
      - redis
      - api

volumes:
  redis_data:
