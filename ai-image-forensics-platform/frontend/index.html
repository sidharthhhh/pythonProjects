<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Forensics Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                <h1>ForensicLens</h1>
            </div>
            <p>AI Generation & Manipulation Detector</p>
        </header>

        <main>
            <div class="upload-section" id="dropZone">
                <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" hidden>
                <div class="upload-content" id="uploadContent">
                    <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <h3>Drag & Drop your image here</h3>
                    <p>or click to browse (JPEG, PNG, WEBP max 50MB)</p>
                </div>
                <div class="preview-container hidden" id="previewContainer">
                    <img id="imagePreview" src="" alt="Preview">
                    <button class="btn-secondary" id="removeBtn">Remove</button>
                </div>
            </div>

            <button class="btn-primary" id="analyzeBtn" disabled>
                <span>Analyze Image</span>
                <div class="spinner hidden" id="loadingSpinner"></div>
            </button>

            <!-- Results Section -->
            <div class="results-panel hidden" id="resultsPanel">
                <div class="score-card" id="scoreCard">
                    <div class="score-circle">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg"
                            d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <path class="circle" id="scorePath"
                            stroke-dasharray="0, 100"
                            d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <text x="18" y="20.35" class="percentage" id="scoreText">0%</text>
                        </svg>
                    </div>
                    <div class="score-details">
                        <h2 id="verdictTitle">Authentic</h2>
                        <p id="explanationText">Waiting for analysis...</p>
                    </div>
                </div>

                <div class="signals-grid">
                    <div class="signal-card" id="c2paCard">
                        <div class="signal-icon c2pa">🛡️</div>
                        <div class="signal-info">
                            <h4>C2PA Provenance</h4>
                            <span class="badge" id="c2paBadge">Unverified</span>
                        </div>
                    </div>
                    
                    <div class="signal-card" id="watermarkCard">
                        <div class="signal-icon watermark">💦</div>
                        <div class="signal-info">
                            <h4>Invisible Watermark</h4>
                            <span class="badge" id="watermarkBadge">None Detected</span>
                        </div>
                    </div>

                    <div class="signal-card" id="metadataCard">
                        <div class="signal-info">
                            <h4>Metadata Hints</h4>
                            <span class="badge" id="metadataBadge">Clean</span>
                        </div>
                    </div>
                    
                    <div class="signal-card" id="forensicCard">
                        <div class="signal-info">
                            <h4>Forensic Traces</h4>
                            <span class="badge" id="forensicBadge">None</span>
                            <div class="trace-list" id="traceList"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="errorBanner" class="error-banner hidden"></div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
